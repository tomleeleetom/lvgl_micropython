      - name: Patch _boot.py to auto-create main.py
        shell: python
        run: |
          path = "lib/micropython/ports/esp32/modules/_boot.py"
          patch = "\n".join([
              "",
              "# --- Auto-create main.py for frozen app ---",
              "import os as _boot_os",
              "try:",
              "    _boot_os.stat('/main.py')",
              "except OSError:",
              "    try:",
              "        _f = open('/main.py', 'w')",
              "        _f.write('import frozen_app\\n')",
              "        _f.close()",
              "    except:",
              "        pass",
              "",
          ])
          with open(path, "a") as f:
              f.write(patch)
          print("=== Patched _boot.py ===")
          with open(path) as f:
              print(f.read())

      - name: Enable large LVGL fonts
        shell: python
        run: |
          import os, glob
          fonts = [28, 32, 40, 48]
          patterns = ["lib/lvgl/lv_conf.h", "lib/lv_conf.h", "lib/lvgl/src/lv_conf_internal.h"]
          found = []
          for p in patterns:
              found.extend(glob.glob(p))
          # Also search recursively
          for f in glob.glob("lib/**/lv_conf.h", recursive=True):
              if f not in found:
                  found.append(f)
          print(f"Found config files: {found}")
          for conf in found:
              with open(conf, "r") as f:
                  content = f.read()
              changed = False
              for sz in fonts:
                  old0 = f"#define LV_FONT_MONTSERRAT_{sz} 0"
                  old1 = f"#define LV_FONT_MONTSERRAT_{sz}  0"
                  new = f"#define LV_FONT_MONTSERRAT_{sz} 1"
                  if old0 in content:
                      content = content.replace(old0, new)
                      changed = True
                      print(f"  Enabled MONTSERRAT_{sz} in {conf}")
                  elif old1 in content:
                      content = content.replace(old1, new)
                      changed = True
                      print(f"  Enabled MONTSERRAT_{sz} in {conf}")
              if changed:
                  with open(conf, "w") as f:
                      f.write(content)
              else:
                  print(f"  No changes needed in {conf}")
          # Verify
          for conf in found:
              with open(conf) as f:
                  for line in f:
                      if "LV_FONT_MONTSERRAT_" in line and ("28" in line or "32" in line or "40" in line or "48" in line):
                          print(f"  {conf}: {line.strip()}")

      - name: Build firmware
        run: |
          set -e
          echo "=== Starting build ==="
          python3 make.py esp32 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT DISPLAY=rgb_display INDEV=gt911
          echo "=== Build completed ==="

      - name: Collect firmware
        run: |
          BUILD_DIR="lib/micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT"
          mkdir -p output
          echo "=== Build directory contents ==="
          ls -la "$BUILD_DIR/"
          echo "=== Copying firmware files ==="
          cp "$BUILD_DIR/firmware.bin" output/firmware.bin
          cp "$BUILD_DIR/micropython.bin" output/micropython.bin
          cp "$BUILD_DIR/bootloader/bootloader.bin" output/bootloader.bin
          cp "$BUILD_DIR/partition_table/partition-table.bin" output/partition-table.bin
          echo "=== Output directory ==="
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-micropython-esp32s3-4848s040-v8
          path: output/*.bin
          if-no-files-found: error

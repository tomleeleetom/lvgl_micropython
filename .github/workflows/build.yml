      - name: Patch _boot.py to auto-create main.py
        shell: python
        run: |
          path = "lib/micropython/ports/esp32/modules/_boot.py"
          patch = "\n".join([
              "",
              "# --- Auto-create main.py for frozen app ---",
              "import os as _boot_os",
              "try:",
              "    _boot_os.stat('/main.py')",
              "except OSError:",
              "    try:",
              "        _f = open('/main.py', 'w')",
              "        _f.write('import frozen_app\\n')",
              "        _f.close()",
              "    except:",
              "        pass",
              "",
          ])
          with open(path, "a") as f:
              f.write(patch)
          print("=== Patched _boot.py ===")
          with open(path) as f:
              print(f.read())

      - name: Build firmware
        run: |
          set -e
          echo "=== Starting build ==="
          python3 make.py esp32 BOARD=ESP32_GENERIC_S3 BOARD_VARIANT=SPIRAM_OCT DISPLAY=rgb_display INDEV=gt911
          echo "=== Build completed ==="

      - name: Collect firmware
        run: |
          BUILD_DIR="lib/micropython/ports/esp32/build-ESP32_GENERIC_S3-SPIRAM_OCT"
          mkdir -p output
          echo "=== Build directory contents ==="
          ls -la "$BUILD_DIR/"
          echo "=== Copying firmware files ==="
          cp "$BUILD_DIR/firmware.bin" output/firmware.bin
          cp "$BUILD_DIR/micropython.bin" output/micropython.bin
          cp "$BUILD_DIR/bootloader/bootloader.bin" output/bootloader.bin
          cp "$BUILD_DIR/partition_table/partition-table.bin" output/partition-table.bin
          echo "=== Output directory ==="
          ls -la output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lvgl-micropython-esp32s3-4848s040-v6
          path: output/*.bin
          if-no-files-found: error

name: Build LVGL MicroPython for ESP32-S3-4848S040

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout lvgl_micropython
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Free GPIO 19/20 for I2C touch
        run: |
          BOARD_DIR="lib/micropython/ports/esp32/boards/ESP32_GENERIC_S3"
          VARIANT_DIR="$BOARD_DIR/SPIRAM_OCT"
          echo "=== Original sdkconfig.board ==="
          cat $BOARD_DIR/sdkconfig.board
          printf '\n# --- ESP32-4848S040 Touch Fix ---\n' >> $BOARD_DIR/sdkconfig.board
          printf 'CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y\n' >> $BOARD_DIR/sdkconfig.board
          printf '# CONFIG_ESP_CONSOLE_USB_CDC is not set\n' >> $BOARD_DIR/sdkconfig.board
          printf '# CONFIG_ESP_CONSOLE_UART_DEFAULT is not set\n' >> $BOARD_DIR/sdkconfig.board
          if [ -f "$VARIANT_DIR/sdkconfig.board" ]; then
            printf '\nCONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y\n' >> $VARIANT_DIR/sdkconfig.board
            printf '# CONFIG_ESP_CONSOLE_USB_CDC is not set\n' >> $VARIANT_DIR/sdkconfig.board
            printf '# CONFIG_ESP_CONSOLE_UART_DEFAULT is not set\n' >> $VARIANT_DIR/sdkconfig.board
          fi
          printf '\n// Disable USB OTG to free GPIO 19/20 for I2C touch\n' >> $BOARD_DIR/mpconfigboard.h
          printf '#define MICROPY_HW_ENABLE_USBDEV (0)\n' >> $BOARD_DIR/mpconfigboard.h
          echo "=== Modified sdkconfig.board ==="
          cat $BOARD_DIR/sdkconfig.board
          echo "=== Modified mpconfigboard.h ==="
          cat $BOARD_DIR/mpconfigboard.h

